<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Developer Explorer</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="navbar">
        <div class="logo">
          <img
            src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
            alt="GitHub"
          />
          <h1>GitHub Developer Explorer</h1>
        </div>
        <button id="themeBtn" class="theme-btn">🌙</button>
      </header>
      <section class="hero">
        <h2>Explore Any GitHub Developer</h2>
        <p>
          Search profiles, repositories, stars, forks and programming languages.
        </p>
      </section>
      <div class="search-box">
        <input type="text" id="username" placeholder="Enter GitHub Username" />
        <button id="searchBtn">🔍 Search</button>
      </div>
      <div id="loader"></div>
      <div id="profile"></div>
      <div class="stats" id="stats"></div>
      <div class="repo-section">
        <h2 id="repoTitle">Repositories</h2>
        <div id="repos"></div>
      </div>
      <footer>Built with HTML, CSS & JavaScript</footer>
    </div>
    <script src="/js/app.js"></script>
  </body>
</html>
